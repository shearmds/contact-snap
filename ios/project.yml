name: ContactSnap
options:
  bundleIdPrefix: com.shearm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.shearm.ContactSnap
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  ContactSnap:
    type: application
    platform: iOS
    sources:
      - ContactSnap
    info:
      path: ContactSnap/Info.plist
      properties:
        CFBundleDisplayName: Snap2Contact
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "Contact Snap needs camera access to photograph business cards."
        NSPhotoLibraryUsageDescription: "Contact Snap needs photo library access to import business card images."
        NSContactsUsageDescription: "Contact Snap saves extracted contact info directly to your Contacts."
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
